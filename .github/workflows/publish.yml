name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        id: publish
        run: npm publish --provenance --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.publish.outcome == 'success'
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Get changelog from commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")blueai-skills
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --format="- %s" --no-merges)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD^ --format="- %s" --no-merges)
          fi

          CONTRIBUTORS=$(git log ${PREV_TAG:+${PREV_TAG}..HEAD} --format="%an" | sort -u | sed 's/^/@/' | paste -sd ', ' -)

          export VERSION CHANGELOG CONTRIBUTORS
          envsubst < .github/RELEASE_TEMPLATE.md > release-notes.md

          gh release create "v${VERSION}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
